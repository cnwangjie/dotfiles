# conf.d/packages.toml — Homebrew formulae/casks + the login shell.
# Merged into the global mise config via ~/.config/mise/conf.d/*.toml (symlinked
# from the repo by the [dotfiles] entry in ../config.toml). Run
# `mise bootstrap --yes` (or `mise bootstrap packages ...`) to converge.
#
# Packages are poured by mise directly into /opt/homebrew (no `brew` binary
# required). Third-party taps are inferred from the owner/tap GitHub URL; add
# [bootstrap.brew.taps] entries if any fail.
#
# Only intentionally-installed formulae are listed; mise resolves the full
# dependency closure automatically. Dropped vs the old Brewfile: `chezmoi`
# (unused) plus 13 pure-dependency libs that other listed packages pull in
# transitively (giflib highway libpng openssl@3 libssh2 glib cairo pango
# librsvg pkgconf gobject-introspection freetds libpq). Kept jpeg/pygobject3/
# faiss/poppler — nothing depends on them, so they must stay explicit.
#
# Service options (cloudflared/smartdns `restart_service`) are not supported
# by mise's brew manager — start those manually if you rely on them.
[bootstrap.packages]
"brew:argocd" = "latest"
"brew:python@3.11" = "latest"
"brew:autojump" = "latest"
"brew:automake" = "latest"
"brew:bat" = "latest"
"brew:bazel" = "latest"
"brew:bear" = "latest"
