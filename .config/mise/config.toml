# ---------------------------------------------------------------------------
# Current-user settings. login_shell is applied by `mise bootstrap user`; the
# brewed zsh must be registered in /etc/shells (mise/chsh may prompt for sudo).
# ---------------------------------------------------------------------------
[bootstrap.user]
login_shell = "/opt/homebrew/bin/zsh"

# ---------------------------------------------------------------------------
# Final imperative step: render the MCP-servers intent (Gemini key pulled from
# gopass at apply time, never stored in this repo) and merge it into
# ~/.claude.json. Replaces the old run_onchange merge-claude-mcp script.
# ---------------------------------------------------------------------------
[tasks.bootstrap]
description = "Render MCP servers from gopass and merge into ~/.claude.json"
run = "bash ~/.dotfiles/tasks/merge-claude-mcp.sh"
