# mise global config — the critical core: settings + the dotfile symlink map.
#
# This file lives in the dotfiles repo (reached via the ~/.dotfiles symlink) and
# is itself managed as a dotfile (see [dotfiles] below): ~/.config/mise/config.toml
# is a symlink back to here. Edit here, then `mise bootstrap` (or `mise dotfiles
# apply`) to converge.
#
# This core holds [settings], the [dotfiles] symlink map, and the language
# runtimes ([tools]). The bulky, less-critical declarations live in sibling files
# that mise merges automatically from ~/.config/mise/conf.d/*.toml (the conf.d/
# dir is symlinked in by a [dotfiles] entry below):
#   conf.d/tools.toml     [tools]                    — cargo:/go:/pipx:/npm: tools
#   conf.d/packages.toml  [bootstrap.packages]       — Homebrew + login_shell
#   conf.d/macos.toml     [bootstrap.macos.defaults] — macOS user defaults
#   conf.d/tasks.toml     [tasks.bootstrap]          — render+merge MCP servers
#
# Replaces the former chezmoi setup. `mise bootstrap` runs, in order:
#   packages -> dotfiles -> macos-defaults -> launchd -> user -> tools -> task
# See https://mise.jdx.dev/bootstrap.html

[settings]
experimental = true            # bootstrap/dotfiles are experimental (mise >= 2026.6.6)
dotfiles.root = "~/.dotfiles"

# Don't eagerly pull missing tools. The global [tools] list (esp. the 19 go:
# binaries) is large and mostly uninstalled; with these on, mise's per-prompt
# hook-env / command-not-found handler tried to `go install`/`cargo install`
# them on *every* command and hung on the network. Install deliberately instead:
# `mise install` (all) or `mise install go:…@latest` (one). Already-installed
# tools (the go/node/python runtimes) still get their PATH set normally.
auto_install = false
not_found_auto_install = false

npm.package_manager = "aube"

# ---------------------------------------------------------------------------
# Tools — language runtimes kept here in the core (they pin the dev baseline).
# mise merges [tools] across config.toml + conf.d/tools.toml, so the bulkier
# cargo:/go:/pipx: backend tools live in conf.d/tools.toml.
# ---------------------------------------------------------------------------
[tools]
java   = "openjdk-17"
python = "latest"
node   = "22.16.0"
aube   = "latest"
go     = "latest"
herdr  = "latest"
bun    = "latest"

# ---------------------------------------------------------------------------
# Dotfiles — symlink each managed file from the repo into $HOME.
# Whole-file/whole-dir symlinks; edit the repo file and the change is live.
# Only the files that were tracked before are mapped — ~/.claude runtime state
# (cache, projects, sessions, …) is deliberately NOT symlinked.
# ---------------------------------------------------------------------------
[dotfiles]
# ~/.dotfiles is the stable symlink to wherever this repo is checked out; every
# other entry sources *through* it (~/.dotfiles/<same path under $HOME>), so the
# repo can live anywhere and no path but the next line is hardcoded.
#
# This first entry self-manages that symlink. Its source MUST be the repo's real
# absolute path — a relative source would resolve against dotfiles.root
# (= ~/.dotfiles) and point the link at itself (circular). This is the one place
# the checkout location is pinned; if you move the repo, update this line and
# re-run `mise dotfiles apply`. (Bootstrap still creates ~/.dotfiles by hand
# first — mise can't read this config until the link already exists; the entry
# just keeps it correct and visible in `mise dotfiles status` afterward.)
"~/.dotfiles"                 = "/Users/wangjie/Workspace/wangjie/dotfiles"

# self-managing: this very config plus the whole conf.d/ dir it pulls in. The
# conf.d symlink must exist for mise to load [tools]/[bootstrap.packages]/[tasks].
# conf.d/ is wholly ours, so it's one directory symlink rather than per-file.
"~/.config/mise/config.toml"  = "~/.dotfiles/.config/mise/config.toml"
"~/.config/mise/conf.d"       = "~/.dotfiles/.config/mise/conf.d"

"~/.zshrc"                    = "~/.dotfiles/.zshrc"
"~/.p10k.zsh"                 = "~/.dotfiles/.p10k.zsh"
"~/.hammerspoon/init.lua"     = "~/.dotfiles/.hammerspoon/init.lua"
"~/.config/ghostty/config"    = "~/.dotfiles/.config/ghostty/config"
"~/.config/helix/config.toml" = "~/.dotfiles/.config/helix/config.toml"
"~/.config/herdr/config.toml" = "~/.dotfiles/.config/herdr/config.toml"
"~/.config/zellij/config.kdl" = "~/.dotfiles/.config/zellij/config.kdl"
"~/.config/zed/settings.json" = "~/.dotfiles/.config/zed/settings.json"

# ~/.claude/* (settings.json, hooks/, skills/) are kept in git but intentionally
# NOT mise-synced — manage/symlink them by hand. .claude/mcp-servers.json is the
# exception: it feeds the [tasks.bootstrap] task (now in conf.d/tasks.toml).
